blueprint:
  name: Airco HVAC control
  description: >
    Automatic airco control with multiple person presence, weekdays,
    time window, anti-flapping, heat/cool logic and optional notifications.

    Version: 0.6
  domain: automation

  input:
    climate:
      name: Climate entity
      selector:
        entity:
          domain: climate

    presence_persons:
      name: Presence persons
      description: Select the persons that should count as home.
      selector:
        entity:
          domain: person
          multiple: true

    set_temperature_climate:
      name: Set temperature climate
      default: 22
      selector:
        number:
          min: 15
          max: 30
          unit_of_measurement: °C
          mode: slider
          step: 0.5

    hvac_modes:
      name: HVAC mode
      default: heat
      selector:
        select:
          options:
            - heat
            - cool
            - dry
            - fan_only

    fan_modes:
      name: Fan mode
      default: auto
      selector:
        select:
          options:
            - auto
            - high
            - low
            - mid

    target_temperature_start:
      name: Start threshold
      default: 18
      selector:
        number:
          min: 15
          max: 30
          unit_of_measurement: °C
          mode: slider
          step: 0.5

    target_temperature_stop:
      name: Stop threshold
      default: 23
      selector:
        number:
          min: 15
          max: 30
          unit_of_measurement: °C
          mode: slider
          step: 0.5

    temperature_delay:
      name: Temperature delay
      default: 5
      selector:
        number:
          min: 0
          max: 60
          unit_of_measurement: minutes
          mode: slider
          step: 1

    use_time_window:
      name: Use time window
      default: true
      selector:
        boolean:

    start_time:
      name: Start time
      default: "00:00:00"
      selector:
        time:

    stop_time:
      name: Stop time
      default: "00:00:00"
      selector:
        time:

    weekday_options:
      name: Weekdays
      default:
        - mon
        - tue
        - wed
        - thu
        - fri
        - sat
        - sun
      selector:
        select:
          multiple: true
          options:
            - label: Monday
              value: mon
            - label: Tuesday
              value: tue
            - label: Wednesday
              value: wed
            - label: Thursday
              value: thu
            - label: Friday
              value: fri
            - label: Saturday
              value: sat
            - label: Sunday
              value: sun

    notify_action:
      name: Optional notify action
      default: []
      selector:
        action:

mode: restart

variables:
  climate_entity: !input climate
  presence_persons: !input presence_persons
  hvac_mode: !input hvac_modes
  fan_mode: !input fan_modes
  set_temp: !input set_temperature_climate
  start_threshold: !input target_temperature_start
  stop_threshold: !input target_temperature_stop
  use_time_window: !input use_time_window
  start_time: !input start_time
  stop_time: !input stop_time
  someone_home: >
    {{ expand(presence_persons)
      | selectattr('state', 'eq', 'home')
      | list
      | count > 0 }}
  nobody_home: >
    {{ expand(presence_persons)
      | selectattr('state', 'eq', 'home')
      | list
      | count == 0 }}

trigger:
  - platform: numeric_state
    entity_id: !input climate
    attribute: current_temperature
    above: !input target_temperature_start
    for:
      minutes: !input temperature_delay
    id: temp_above_start

  - platform: numeric_state
    entity_id: !input climate
    attribute: current_temperature
    below: !input target_temperature_start
    for:
      minutes: !input temperature_delay
    id: temp_below_start

  - platform: numeric_state
    entity_id: !input climate
    attribute: current_temperature
    above: !input target_temperature_stop
    for:
      minutes: !input temperature_delay
    id: temp_above_stop

  - platform: numeric_state
    entity_id: !input climate
    attribute: current_temperature
    below: !input target_temperature_stop
    for:
      minutes: !input temperature_delay
    id: temp_below_stop

  - platform: time
    at: !input start_time
    id: time_start

  - platform: time
    at: !input stop_time
    id: time_stop

  - platform: state
    entity_id: !input presence_persons
    id: presence_change

condition:
  - condition: time
    weekday: !input weekday_options

action:
  - choose:
      - alias: Turn on climate
        conditions:
          - condition: template
            value_template: "{{ is_state(climate_entity, 'off') }}"

          - condition: template
            value_template: "{{ someone_home }}"

          - condition: template
            value_template: >
              {{ not use_time_window
                or start_time == stop_time
                or (now().strftime('%H:%M:%S') >= start_time
                    and now().strftime('%H:%M:%S') < stop_time) }}

          - condition: template
            value_template: >
              {{
                (hvac_mode == 'cool'
                  and trigger.id in ['temp_above_start', 'time_start', 'presence_change'])
                or
                (hvac_mode == 'heat'
                  and trigger.id in ['temp_below_start', 'time_start', 'presence_change'])
                or
                (hvac_mode in ['dry', 'fan_only']
                  and trigger.id in ['time_start', 'presence_change'])
              }}

        sequence:
          - action: climate.set_temperature
            target:
              entity_id: !input climate
            data:
              temperature: !input set_temperature_climate
              hvac_mode: !input hvac_modes

          - action: climate.set_fan_mode
            target:
              entity_id: !input climate
            data:
              fan_mode: !input fan_modes

          - choose:
              - conditions: "{{ notify_action | count > 0 }}"
                sequence: !input notify_action

      - alias: Turn off climate
        conditions:
          - condition: template
            value_template: "{{ not is_state(climate_entity, 'off') }}"

          - condition: template
            value_template: >
              {{
                trigger.id == 'time_stop'
                or
                (trigger.id == 'presence_change' and nobody_home)
                or
                (hvac_mode == 'cool' and trigger.id == 'temp_below_stop')
                or
                (hvac_mode == 'heat' and trigger.id == 'temp_above_stop')
              }}

        sequence:
          - action: climate.turn_off
            target:
              entity_id: !input climate

          - choose:
              - conditions: "{{ notify_action | count > 0 }}"
                sequence: !input notify_action
